name: PR Checks - Node (npm)

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Working directory for npm commands'
        required: false
        type: string
        default: '.'
      node-version:
        description: 'Node.js version (overrides .node-version file if set)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: read

jobs:
  testing:
    name: Testing
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ secrets.CI_TOKEN || secrets.GITHUB_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js (with version file)
        if: inputs.node-version == ''
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Setup Node.js (with explicit version)
        if: inputs.node-version != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Lint
        uses: nullplatform/actions-nullplatform/.github/actions/run-first@main
        with:
          candidates: 'test:static lint'
          package-manager: npm
          working-directory: ${{ inputs.working-directory }}

      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        run: npm test
