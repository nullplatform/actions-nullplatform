name: Docker Security Scan

on:
  workflow_call:
    inputs:
      context:
        description: 'Build context directory'
        required: true
        type: string
      dockerfile:
        description: 'Path to Dockerfile relative to context'
        required: false
        type: string
        default: 'Dockerfile'
      image_name:
        description: 'Name for the scanned image (used for reporting)'
        required: true
        type: string
      severity:
        description: 'Minimum severity to report (CRITICAL,HIGH,MEDIUM,LOW)'
        required: false
        type: string
        default: 'CRITICAL,HIGH'
      build_args:
        description: 'Docker build arguments (multiline, one per line: KEY=VALUE)'
        required: false
        type: string
        default: ''
      exit_code:
        description: 'Exit code when vulnerabilities are found (0 to not fail)'
        required: false
        type: number
        default: 1
      upload_sarif:
        description: 'Upload SARIF results to GitHub Security tab'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  scan:
    name: Security Scan
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ inputs.image_name }}:scan
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        id: scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ inputs.image_name }}:scan'
          format: 'table'
          exit-code: '${{ inputs.exit_code }}'
          severity: '${{ inputs.severity }}'
          ignore-unfixed: true
        continue-on-error: true

      - name: Generate SARIF report
        if: inputs.upload_sarif
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ inputs.image_name }}:scan'
          format: 'sarif'
          output: 'results.sarif'
          severity: '${{ inputs.severity }}'
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security tab
        if: inputs.upload_sarif && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: trivy-docker-${{ inputs.image_name }}
        continue-on-error: true

      - name: Fail if vulnerabilities found
        if: steps.scan.outcome == 'failure'
        run: exit 1
