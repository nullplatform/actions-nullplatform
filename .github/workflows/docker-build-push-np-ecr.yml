name: Docker Build and Push to ECR

on:
  workflow_call:
    inputs:
      ecr_registry:
        description: 'ECR registry URL'
        required: false
        type: string
        default: 'public.ecr.aws/nullplatform'
      aws_region:
        description: 'AWS region for ECR'
        required: false
        type: string
        default: 'us-east-1'
      platforms:
        description: 'Target platforms for multi-arch build (passed as DOCKER_PLATFORMS env var to make)'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
    secrets:
      aws_role_arn:
        description: 'AWS IAM Role ARN for OIDC authentication'
        required: true
      nullplatform_api_key:
        description: 'Nullplatform API key for CLI authentication'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-24.04
    env:
      NULLPLATFORM_API_KEY: ${{ secrets.nullplatform_api_key }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install nullplatform cli
        run: curl https://cli.nullplatform.com/install.sh | sh
      - name: Start nullplatform CI
        run: np build start

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-24.04
    needs: prepare
    env:
      ASSET_TYPE: docker-image
      DOCKER_REGISTRY: ${{ inputs.ecr_registry }}
      DOCKER_PLATFORMS: ${{ inputs.platforms }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public
      - name: Build asset
        run: make build
      - name: Push asset
        run: make push

  finalize:
    runs-on: ubuntu-24.04
    needs: [prepare, build-and-push]
    if: always()
    env:
      NULLPLATFORM_API_KEY: ${{ secrets.nullplatform_api_key }}
      BUILD_RESULT: ${{ needs.build-and-push.result }}
    steps:
      - name: Install nullplatform cli
        run: curl https://cli.nullplatform.com/install.sh | sh
      - name: End nullplatform CI
        run: |
          if [ "$BUILD_RESULT" = "success" ]; then
            np build update --status successful
          else
            np build update --status failed
          fi
