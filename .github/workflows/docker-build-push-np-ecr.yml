name: Docker Build and Push to ECR

on:
  workflow_call:
    inputs:
      platforms:
        description: 'Target platforms for multi-arch build (passed as DOCKER_PLATFORMS env var to make)'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
    secrets:
      nullplatform_api_key:
        description: 'Nullplatform API key for CLI authentication'
        required: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-24.04
    env:
      NULLPLATFORM_API_KEY: ${{ secrets.nullplatform_api_key }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install nullplatform cli
        run: curl https://cli.nullplatform.com/install.sh | sh
      - name: Start nullplatform CI
        run: np build start

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-24.04
    needs: prepare
    env:
      ASSET_TYPE: docker-image
      DOCKER_PLATFORMS: ${{ inputs.platforms }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build asset
        run: make build
      - name: Push asset
        run: make push

  finalize:
    runs-on: ubuntu-24.04
    needs: [prepare, build-and-push]
    if: always()
    env:
      NULLPLATFORM_API_KEY: ${{ secrets.nullplatform_api_key }}
      BUILD_RESULT: ${{ needs.build-and-push.result }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Install nullplatform cli
        run: curl https://cli.nullplatform.com/install.sh | sh
      - name: End nullplatform CI
        run: |
          if [ "$BUILD_RESULT" = "success" ]; then
            np build update --status successful
          else
            np build update --status failed
          fi
