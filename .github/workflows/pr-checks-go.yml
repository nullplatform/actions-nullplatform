name: PR Checks - Go

on:
  workflow_call:

permissions:
  contents: read

jobs:
  testing:
    name: Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: 'go.mod'

      - name: Lint
        run: go vet ./...

      - name: Run tests
        run: go test ./...
