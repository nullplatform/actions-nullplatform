name: PR Checks - Go

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Working directory for go commands'
        required: false
        type: string
        default: '.'
      go-version:
        description: 'Go version (overrides go.mod if set)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  testing:
    name: Testing
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go (with version file)
        if: inputs.go-version == ''
        uses: actions/setup-go@v4
        with:
          go-version-file: 'go.mod'

      - name: Set up Go (with explicit version)
        if: inputs.go-version != ''
        uses: actions/setup-go@v4
        with:
          go-version: ${{ inputs.go-version }}

      - name: Lint
        working-directory: ${{ inputs.working-directory }}
        run: go vet ./...

      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        run: go test ./...
