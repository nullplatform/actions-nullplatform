name: PR Checks - Docker Build

on:
  workflow_call:
    inputs:
      context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      dockerfile:
        description: 'Path to the Dockerfile'
        required: false
        type: string
        default: 'Dockerfile'
      use_buildkit_secret:
        description: 'Use BuildKit --secret for GITHUB_TOKEN instead of --build-arg (requires updated Dockerfile)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: Docker Build
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Build image (legacy --build-arg)
        if: ${{ !inputs.use_buildkit_secret }}
        env:
          GITHUB_TOKEN: ${{ secrets.CI_TOKEN || secrets.GITHUB_TOKEN }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          CONTEXT: ${{ inputs.context }}
        run: docker build --build-arg GITHUB_TOKEN="$GITHUB_TOKEN" -f "$DOCKERFILE" -t pr-check "$CONTEXT"

      - name: Build image (BuildKit secret)
        if: ${{ inputs.use_buildkit_secret }}
        env:
          GITHUB_TOKEN: ${{ secrets.CI_TOKEN || secrets.GITHUB_TOKEN }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          CONTEXT: ${{ inputs.context }}
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --secret id=GITHUB_TOKEN,env=GITHUB_TOKEN \
            -f "$DOCKERFILE" -t pr-check "$CONTEXT"
