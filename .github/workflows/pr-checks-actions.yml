name: pr-checks-actions

on:
  pull_request:

permissions:
  contents: read

jobs:
  actionlint:
    name: Validate Actions syntax
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install actionlint
        run: |
          wget -q https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz
          tar xzf actionlint_1.7.7_linux_amd64.tar.gz actionlint

      - name: Run actionlint
        run: |
          ./actionlint -ignore 'unknown permission scope "models"'

  secret-scan:
    name: Scan for credentials
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy secret scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'secret'
          format: 'table'
          exit-code: '1'
